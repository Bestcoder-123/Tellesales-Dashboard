<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pharma_Beibora_Flip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  .flippable {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: none;
    overflow: hidden;
  }

  .flippable.active {
    opacity: 1;
    display: block;
  }

  iframe {
    border: none;
    width: 100%;
    height: 100%;
    background: black;
  }

  #countdownOverlay {
    position: absolute;
    top:0; left:0;
    width: 100%;
    height: 100%;
    z-index: 10;
    display: none;
    background: url('Philmed_logo.png') center/cover no-repeat;
  }
</style>
<script>
document.addEventListener("DOMContentLoaded", function() {

  const dashboards = [
    { url: "Pharma_Telesales_Statistics.html", duration: 5 * 60 * 1000, scroll: true },
    { url: "Countdown.html", duration: 1 * 60 * 1000, scroll: false },
    { url: "Beibora_Telesales_Statistics.html", duration: 3 * 60 * 1000, scroll: true },
    { url: "Countdown.html", duration: 1 * 60 * 1000, scroll: false }
  ];

  let index = 0;
  const frame = document.getElementById("dashboardFrame");
  const overlay = document.getElementById("countdownOverlay");
  let scrollAnimationId;

  document.querySelectorAll(".flippable").forEach(el => el.style.display = "block");

  function smoothScroll(iframe, cycles = 2, speed = 1.2) {
    const doc = iframe.contentWindow.document.documentElement;
    const scrollHeight = doc.scrollHeight - doc.clientHeight;
    let direction = 1; // 1 = down, -1 = up
    let currentCycle = 0;
    let pos = 0;

    function step() {
      pos += direction * speed;
      if (pos >= scrollHeight) { pos = scrollHeight; direction = -1; }
      if (pos <= 0) { pos = 0; direction = 1; currentCycle++; }

      iframe.contentWindow.scrollTo(0, pos);

      if (currentCycle < cycles) {
        scrollAnimationId = requestAnimationFrame(step);
      } else {
        rotate(); // proceed to next dashboard
      }
    }

    step();
  }

  function loadDashboard(i) {
    cancelAnimationFrame(scrollAnimationId);

    frame.classList.remove("active");
    overlay.style.display = "none";

    // Reload data on flip
    frame.src = dashboards[i].url + "?v=" + new Date().getTime();

    frame.onload = () => {
      frame.classList.add("active");

      if (dashboards[i].url.includes("Countdown.html")) {
        overlay.style.display = "block";
        setTimeout(() => rotate(), dashboards[i].duration);
      } else if (dashboards[i].scroll) {
        smoothScroll(frame, 2, 1.2); // medium speed, 2 cycles
      } else {
        setTimeout(() => rotate(), dashboards[i].duration);
      }
    };
  }

  function rotate() {
    index = (index + 1) % dashboards.length;
    loadDashboard(index);
  }

  // Start
  loadDashboard(index);

});
</script>
</head>
<body>

<iframe id="dashboardFrame" class="flippable"></iframe>

<!-- Fullscreen overlay for Countdown dashboard -->
<div id="countdownOverlay"></div>

</body>
</html>
