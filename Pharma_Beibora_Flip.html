<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharma_Beibora_Flip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  .flippable {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: none;
  }

  .flippable.active {
    opacity: 1;
    display: block;
  }

  iframe {
    border: none;
    width: 100%;
    height: 100%;
    background: black;
  }

  /* Countdown overlay */
  #countdownOverlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
    overflow:hidden;
  }

  #countdownOverlay .background {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background: url('Philmed_logo.png') center/cover no-repeat;
    filter: blur(8px) brightness(0.4);
    z-index:1;
  }

  #countdownOverlay .content {
    position: relative;
    z-index:2;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    font-size:2.5vw;
    line-height:1.2;
  }

  #countdownOverlay .content .counter {
    font-size: 5vw;
    font-weight: bold;
    margin: 0.2em;
  }

  @media (max-width:768px){
    #countdownOverlay .content {
      font-size:4vw;
    }
    #countdownOverlay .content .counter {
      font-size:8vw;
    }
  }
</style>
<script>
document.addEventListener("DOMContentLoaded", function() {

  const dashboards = [
    { url: "Pharma_Telesales_Statistics.html", duration: 5*60*1000, scroll: true },
    { url: "Beibora_Telesales_Statistics.html", duration: 3*60*1000, scroll: true }
  ];

  const countdownDuration = 1*60*1000; // 1 minute
  let index = 0;
  const frame = document.getElementById("dashboardFrame");
  const overlay = document.getElementById("countdownOverlay");
  let scrollTimer, countdownTimer;

  document.querySelectorAll(".flippable").forEach(el => el.style.display = "block");

  // Smooth scrolling within iframe for given duration
  function smoothScrollTimeBased(iframe, cycles = 2, duration){
    const doc = iframe.contentWindow.document.documentElement;
    const scrollHeight = doc.scrollHeight - doc.clientHeight;
    let start = null;

    function step(timestamp){
        if(!start) start = timestamp;
        const elapsed = timestamp - start;
        const totalCycles = cycles * 2; // down+up
        const progress = (elapsed / duration) * totalCycles;
        const phase = Math.floor(progress);
        const t = progress - phase;

        let pos;
        if(phase % 2 === 0){ pos = t * scrollHeight; }
        else { pos = (1-t) * scrollHeight; }

        iframe.contentWindow.scrollTo(0,pos);

        if(elapsed < duration){
            scrollTimer = requestAnimationFrame(step);
        }
    }

    scrollTimer = requestAnimationFrame(step);
  }

  // Countdown overlay update
  function updateCountdown(){
    const now = new Date();
    const end = new Date(now.getTime() + countdownDuration);
    const diff = end - now;

    if(diff <=0) return;

    const m = Math.floor(diff / (1000*60));
    const s = Math.floor((diff % (1000*60))/1000);

    overlay.querySelector('#minutes').innerText = String(m).padStart(2,'0');
    overlay.querySelector('#seconds').innerText = String(s).padStart(2,'0');
  }

  // Show countdown overlay for exact countdownDuration
  function showCountdown(){
    frame.classList.remove("active");
    overlay.style.display = "flex";
    updateCountdown();
    countdownTimer = setInterval(updateCountdown, 1000);

    setTimeout(()=>{
      overlay.style.display="none";
      clearInterval(countdownTimer);
      index = (index+1)%dashboards.length;
      loadDashboard(index);
    }, countdownDuration);
  }

  // Load dashboard at index i
  function loadDashboard(i){
    cancelAnimationFrame(scrollTimer);
    clearInterval(countdownTimer);

    frame.classList.remove("active");
    overlay.style.display = "none";

    frame.src = dashboards[i].url + "?v=" + new Date().getTime();

    frame.onload = () => {
      frame.classList.add("active");

      const dashDuration = dashboards[i].duration;

      if(dashboards[i].scroll){
        smoothScrollTimeBased(frame, 2, dashDuration);
      }

      // Show countdown after dashboard duration
      setTimeout(showCountdown, dashDuration);
    };
  }

  // Start cycle
  loadDashboard(index);

});
</script>
</head>
<body>

<iframe id="dashboardFrame" class="flippable"></iframe>

<!-- Fullscreen Countdown overlay -->
<div id="countdownOverlay">
  <div class="background"></div>
  <div class="content">
    <div class="counter" id="minutes">00</div>
    <div class="counter" id="seconds">00</div>
    <div>Countdown to Q1 end</div>
  </div>
</div>

</body>
</html>
