<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pharma_Beibora_Flip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  .flippable {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: none;
    overflow: hidden;
  }

  .flippable.active {
    opacity: 1;
    display: block;
  }

  iframe {
    border: none;
    width: 100%;
    height: 100%;
    background: black;
  }

  #logos {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 5;
    display: none; /* Initially hidden */
  }

  #logos img {
    height: 60px;
    width: auto;
  }
</style>
<script>
document.addEventListener("DOMContentLoaded", function() {

  const dashboards = [
    { url: "Pharma_Telesales_Statistics.html", scroll: true },
    { url: "Countdown.html", scroll: false, duration: 60000 }, // 1 minute
    { url: "Beibora_Telesales_Statistics.html", scroll: true }
  ];

  let index = 0;
  const frame = document.getElementById("dashboardFrame");
  const logos = document.getElementById("logos");

  document.querySelectorAll(".flippable").forEach(el => el.style.display = "block");

  function smoothScroll(iframe, cycles = 2, speed = 1) {
    const doc = iframe.contentWindow.document.documentElement;
    const scrollHeight = doc.scrollHeight - doc.clientHeight;
    let direction = 1; // 1=down, -1=up
    let currentCycle = 0;
    let pos = 0;

    function step() {
      pos += direction * speed;
      if(pos >= scrollHeight) { pos = scrollHeight; direction = -1; }
      if(pos <= 0) { pos = 0; direction = 1; currentCycle++; }

      iframe.contentWindow.scrollTo(0, pos);

      if(currentCycle < cycles) {
        requestAnimationFrame(step);
      } else {
        rotate(); // proceed to next dashboard
      }
    }

    requestAnimationFrame(step);
  }

  function loadDashboard(i) {
    frame.classList.remove("active");
    logos.style.display = "none"; // hide logos by default

    frame.src = dashboards[i].url + "?v=" + new Date().getTime();

    frame.onload = () => {
      frame.classList.add("active");

      // Show logos only for Countdown.html
      if(dashboards[i].url.includes("Countdown.html")) {
        logos.style.display = "flex";
        setTimeout(() => rotate(), dashboards[i].duration || 60000);
      } else if(dashboards[i].scroll) {
        // smooth scrolling for dashboards
        smoothScroll(frame, 2, 1.2); // medium speed
      }
    };
  }

  function rotate() {
    index = (index + 1) % dashboards.length;
    loadDashboard(index);
  }

  // Start
  loadDashboard(index);
});
</script>
</head>
<body>
  <iframe id="dashboardFrame" class="flippable"></iframe>

  <!-- Logos appear only for Countdown.html -->
  <div id="logos">
    <img src="Philmed_logo.png" alt="Philmed Logo Left">
    <img src="Philmed_logo.png" alt="Philmed Logo Right">
  </div>
</body>
</html>
