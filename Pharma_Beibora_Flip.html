<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pharma_Beibora_Flip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  .flippable {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: none;
    overflow: hidden;
  }

  .flippable.active {
    opacity: 1;
    display: block;
  }

  iframe {
    border: none;
    width: 100%;
    height: 100%;
    background: black;
  }

  #countdownOverlay {
    position: absolute;
    top:0; left:0;
    width: 100%;
    height: 100%;
    z-index: 10;
    display: none;
    background: url('Philmed_logo.png') center/cover no-repeat;
  }
</style>
<script>
document.addEventListener("DOMContentLoaded", function() {

  // Only main dashboards
  const dashboards = [
    { url: "Pharma_Telesales_Statistics.html", duration: 5*60*1000, scroll: true },
    { url: "Beibora_Telesales_Statistics.html", duration: 3*60*1000, scroll: true }
  ];

  const countdownDuration = 1*60*1000; // 1 minute for Countdown overlay
  let index = 0;
  const frame = document.getElementById("dashboardFrame");
  const overlay = document.getElementById("countdownOverlay");
  let scrollAnimationId;

  document.querySelectorAll(".flippable").forEach(el => el.style.display = "block");

  function smoothScroll(iframe, cycles = 2, speed = 1.2) {
    const doc = iframe.contentWindow.document.documentElement;
    const scrollHeight = doc.scrollHeight - doc.clientHeight;
    let pos = 0;
    let direction = 1;
    let cycle = 0;

    function step() {
      pos += direction * speed;
      if(pos >= scrollHeight) { pos = scrollHeight; direction = -1; }
      if(pos <= 0) { pos = 0; direction = 1; cycle++; }

      iframe.contentWindow.scrollTo(0, pos);

      if(cycle < cycles) {
        scrollAnimationId = requestAnimationFrame(step);
      } else {
        showCountdown();
      }
    }

    step();
  }

  function loadDashboard(i) {
    cancelAnimationFrame(scrollAnimationId);

    overlay.style.display = "none";
    frame.classList.remove("active");

    frame.src = dashboards[i].url + "?v=" + new Date().getTime();

    frame.onload = () => {
      frame.classList.add("active");

      if(dashboards[i].scroll) {
        smoothScroll(frame, 2, 1.2);
      } else {
        setTimeout(() => showCountdown(), dashboards[i].duration);
      }
    };
  }

  function showCountdown() {
    frame.classList.remove("active");
    overlay.style.display = "block";

    setTimeout(() => {
      overlay.style.display = "none";
      index = (index + 1) % dashboards.length;
      loadDashboard(index);
    }, countdownDuration);
  }

  // Start with Pharma
  loadDashboard(index);

});
</script>
</head>
<body>

<iframe id="dashboardFrame" class="flippable"></iframe>
<div id="countdownOverlay"></div>

</body>
</html>
