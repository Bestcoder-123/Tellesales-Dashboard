<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pharma_Beibora_Flip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100vh;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  .flippable {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: none;
  }

  .flippable.active {
    opacity: 1;
    display: block;
  }

  iframe {
    border: none;
    width: 100%;
    height: 100%;
    background: black;
  }

  /* Logos for Countdown page */
  #logos {
    position: absolute;
    top: 10px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 5;
  }

  #logos img {
    height: 60px;
    width: auto;
  }

</style>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const dashboards = [
    { url: "Pharma_Telesales_Statistics.html", scroll: true },
    { url: "Countdown.html", scroll: false },
    { url: "Beibora_Telesales_Statistics.html", scroll: true }
  ];

  let index = 0;
  const frame = document.getElementById("dashboardFrame");

  document.querySelectorAll(".flippable").forEach(el => el.style.display = "block");

  function scrollDashboard(iframe, cycles = 2, duration = 5000) {
    let step = 0;
    const maxStep = cycles * 2;
    const scrollDoc = iframe.contentWindow.document.documentElement;
    const scrollHeight = scrollDoc.scrollHeight - scrollDoc.clientHeight;

    const interval = setInterval(() => {
      if(step < maxStep){
        const top = (step % 2 === 0) ? scrollHeight : 0;
        iframe.contentWindow.scrollTo({ top: top, behavior: 'smooth' });
        step++;
      } else {
        clearInterval(interval);
        rotate();
      }
    }, duration);
  }

  function loadDashboard(i) {
    frame.src = dashboards[i].url + "?v=" + new Date().getTime();

    if(dashboards[i].scroll){
      frame.onload = () => scrollDashboard(frame);
    } else {
      // Countdown page: show for 10s
      frame.onload = () => setTimeout(rotate, 10000);
    }
  }

  function flipTransition() {
    frame.classList.remove("active");
    setTimeout(() => {
      loadDashboard(index);
      frame.classList.add("active");
    }, 500);
  }

  function rotate() {
    index = (index + 1) % dashboards.length;
    flipTransition();
  }

  // Start first dashboard
  loadDashboard(index);
  frame.classList.add("active");
});
</script>
</head>
<body>
  <iframe id="dashboardFrame" class="flippable"></iframe>

  <!-- Logos appear only for Countdown page -->
  <div id="logos">
    <img src="Philmed_logo.png" alt="Philmed Logo Left">
    <img src="Philmed_logo.png" alt="Philmed Logo Right">
  </div>
</body>
</html>
