<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pharma_Beibora_Flip</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  .flippable {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    transition: opacity 1s ease-in-out;
    display: none;
  }

  .flippable.active {
    opacity: 1;
    display: block;
  }

  iframe {
    border: none;
    width: 100%;
    height: 100%;
    background: black;
  }

  /* Countdown overlay */
  #countdownOverlay {
    position: absolute;
    top:0; left:0;
    width:100%; height:100%;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
    overflow:hidden;
    display: none;
  }

  /* Corner logos */
  #countdownOverlay .logo {
    position: absolute;
    width: 80px;
    height: auto;
    z-index: 11;
  }
  #countdownOverlay .top-left { top: 10px; left: 10px; }
  #countdownOverlay .top-right { top: 10px; right: 10px; }

  #countdownOverlay .content {
    position: relative;
    z-index:12;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    font-size:2.5vw;
    line-height:1.2;
  }

  #countdownOverlay .content .counter {
    font-size: 5vw;
    font-weight: bold;
    margin: 0.2em;
  }

  @media (max-width:768px){
    #countdownOverlay .content { font-size:4vw; }
    #countdownOverlay .content .counter { font-size:8vw; }
  }
</style>
</head>
<body>

<iframe id="dashboardFrame" class="flippable"></iframe>

<!-- Fullscreen Countdown overlay with corner logos -->
<div id="countdownOverlay">
  <img src="Philmed_logo.png" class="logo top-left" />
  <img src="Philmed_logo.png" class="logo top-right" />

  <div class="content">
    <div class="counter" id="minutes">00</div>
    <div class="counter" id="seconds">00</div>
    <div>Countdown</div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const dashboards = [
    { url: "Pharma_Telesales_Statistics.html", scroll: true },
    { url: "Beibora_Telesales_Statistics.html", scroll: true }
  ];

  const scrollCycles = 2;       // 2 complete scroll cycles
  const countdownDuration = 1*60*1000; // 1 minute
  let index = 0;

  const frame = document.getElementById("dashboardFrame");
  const overlay = document.getElementById("countdownOverlay");
  let scrollTimer, countdownTimer;

  // Smooth scroll for N cycles over duration
  function smoothScroll(iframe, cycles, duration){
    const doc = iframe.contentWindow.document.documentElement;
    const scrollHeight = doc.scrollHeight - doc.clientHeight;
    let start = null;

    function step(timestamp){
      if(!start) start = timestamp;
      const elapsed = timestamp - start;
      const totalCycles = cycles * 2; // down + up
      const progress = (elapsed / duration) * totalCycles;
      const phase = Math.floor(progress);
      const t = progress - phase;

      let pos;
      if(phase % 2 === 0) pos = t * scrollHeight;
      else pos = (1-t) * scrollHeight;

      iframe.contentWindow.scrollTo(0,pos);

      if(elapsed < duration){
        scrollTimer = requestAnimationFrame(step);
      } else {
        showCountdown();
      }
    }

    scrollTimer = requestAnimationFrame(step);
  }

  // Countdown overlay update
  function updateCountdown(endTime){
    const now = new Date();
    let diff = endTime - now;
    if(diff < 0) diff = 0;

    const m = Math.floor(diff / (1000*60));
    const s = Math.floor((diff % (1000*60))/1000);

    overlay.querySelector('#minutes').innerText = String(m).padStart(2,'0');
    overlay.querySelector('#seconds').innerText = String(s).padStart(2,'0');
  }

  function showCountdown(){
    cancelAnimationFrame(scrollTimer);
    overlay.style.display = "flex";

    const endTime = new Date(new Date().getTime() + countdownDuration);
    updateCountdown(endTime);
    countdownTimer = setInterval(()=>updateCountdown(endTime), 1000);

    setTimeout(()=>{
      overlay.style.display = "none";
      clearInterval(countdownTimer);
      index = (index + 1) % dashboards.length;
      loadDashboard(index);
    }, countdownDuration);
  }

  function loadDashboard(i){
    cancelAnimationFrame(scrollTimer);
    clearInterval(countdownTimer);

    frame.classList.remove("active");
    overlay.style.display = "none";

    frame.src = dashboards[i].url + "?v=" + new Date().getTime();

    frame.onload = () => {
      frame.classList.add("active");
      setTimeout(()=>{
        if(dashboards[i].scroll){
          // Scroll duration: 30s per cycle * 2 cycles = 60s (adjust if needed)
          const duration = 30000 * scrollCycles;
          smoothScroll(frame, scrollCycles, duration);
        } else {
          setTimeout(showCountdown, countdownDuration);
        }
      }, 1000);
    };
  }

  loadDashboard(index);

});
</script>

</body>
</html>
